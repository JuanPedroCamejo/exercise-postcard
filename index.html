<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>My Postcard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Handlee&display=swap" rel="stylesheet">
</head>

<body>

<div class="postcard">

    <div class="postcard-header">
        <h1>My Postcard</h1>
        <img src="https://storage.googleapis.com/breathecode-asset-images/5318bde604cf5c915f94897a71b49ab2523101322ea21cb046db1e67c24fa3be.png">
    </div>

    <div class="postcard-body">

        <div class="left-part">
            <p>
                Look how awesome! This is a postcard that I created using HTML5 and CSS3 during my Full Stack Developer course at 4Geeks Academy.
            </p>

            <p>
                This is so cool, can't wait to start doing more stuff!
            </p>
        </div>

        <div class="right-part">
            <input type="text" placeholder="Some Name">
            <input type="text" placeholder="Some Email">
            <input type="text" placeholder="Some comment">
        </div>

    </div>

    <div class="postcard-footer">
        <button>Send My Postcard</button>
    </div>

</div>

</body>
</html>
